name: Agent Task
description: Create a task for the Claude agent team to work on
labels: ["claude"]
body:
  - type: dropdown
    id: task-type
    attributes:
      label: Task Type
      options:
        - Feature
        - Bug Fix
        - Design Review
        - CMS Change
        - Code Review
        - Deploy Check
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done? Be as specific as possible.
      placeholder: "e.g., Add a 'vegan-friendly' filter option to the cafe filter bar"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Frontend Components
        - Backend / API
        - Sanity CMS
        - Styling / Design
        - Full Stack
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, references, or any other helpful information.
      placeholder: "Optional: paste screenshots, links to Figma, or reference existing pages"
    validations:
      required: false
